---
name: QA

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - name: Run pre-commit
        run: uvx pre-commit run --all-files --show-diff-on-failure
