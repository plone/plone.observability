services:
  plone:
    image: plone/plone-backend:6.2
    environment:
      ADDONS: "plone.observability"
    ports:
      - "8080:8080"
      - "8081:8081"
    configs:
      - source: zope_ini
        target: /app/etc/zope.ini

configs:
  zope_ini:
    content: |
      [app:zope]
      use = egg:Zope#main
      zope_conf = %(here)s/%(config_file)s

      [server:main]
      use = egg:waitress#main
      host = 0.0.0.0
      port = 8080
      threads = 2
      clear_untrusted_proxy_headers = false
      max_request_body_size = 1073741824

      [filter:translogger]
      use = egg:Paste#translogger
      setup_console_handler = False

      [filter:healthserver]
      use = egg:plone.observability#healthserver

      [filter:observability]
      use = egg:plone.observability#observability

      [pipeline:main]
      pipeline =
          egg:Zope#httpexceptions
          healthserver
          observability
          translogger
          zope

      [loggers]
      keys = root, waitress.queue, waitress, wsgi

      [handlers]
      keys = accesslog, eventlog

      [formatters]
      keys = generic, message

      [formatter_generic]
      format = %(asctime)s %(levelname)s [%(name)s:%(lineno)s][%(threadName)s] %(message)s
      datefmt = %Y-%m-%d %H:%M:%S

      [formatter_message]
      format = %(message)s

      [logger_root]
      level = INFO
      handlers = eventlog

      [logger_waitress.queue]
      level = INFO
      handlers = eventlog
      qualname = waitress.queue
      propagate = 0

      [logger_waitress]
      level = INFO
      handlers = eventlog
      qualname = waitress
      propagate = 0

      [logger_wsgi]
      level = WARN
      handlers = accesslog
      qualname = wsgi
      propagate = 0

      [handler_accesslog]
      class = StreamHandler
      args = (sys.stdout,)
      level = INFO
      formatter = message

      [handler_eventlog]
      class = StreamHandler
      args = (sys.stderr,)
      level = INFO
      formatter = generic
