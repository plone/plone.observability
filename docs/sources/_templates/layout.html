{# Extend the theme's layout to inject icons, manifest, and Open Graph meta #}
{% extends "!layout.html" %}

{% block metatags %}
{{ super() }}
<link href="{{ pathto('_static/apple-touch-icon.png', 1) }}"
      rel="apple-touch-icon"
      sizes="180x180"
/>
<link href="{{ pathto('_static/site.webmanifest', 1) }}"
      rel="manifest"
/>
<meta property="og:type"
      content="website"
/>
<meta property="og:title"
      content="{{ title }}"
/>
<meta property="og:description"
      content="Kubernetes-style health probes, Prometheus metrics, and OpenTelemetry tracing for Plone in containers."
/>
<meta property="og:image"
      content="https://plone.github.io/plone.observability/_static/og-image.png"
/>
<meta property="og:url"
      content="https://plone.github.io/plone.observability/"
/>
<meta name="twitter:card"
      content="summary_large_image"
/>
{% endblock %}
